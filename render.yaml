# Render Blueprint for the GoalVision AI backend.
# Deploy: push to GitHub, then "New + > Blueprint" in Render and point it at this repo.
services:
  - type: web
    name: goalvision-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 4000
      - key: CORS_ORIGIN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: OPENAI_MODEL
        value: openai/gpt-oss-120b
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_FLASH_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_PRO_MODEL
        value: gemini-2.5-pro
      - key: NVIDIA_API_KEY
        sync: false
      - key: NEMOTRON_MODEL
        value: nvidia/nemotron-ultra
      - key: MINIMAX_API_KEY
        sync: false
      - key: MINIMAX_MODEL
        value: minimax-m3
      - key: RAPIDAPI_KEY
        sync: false
      - key: RAPIDAPI_HOST
        value: api-football186.p.rapidapi.com
